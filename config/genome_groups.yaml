# genome_groups.yaml
# Each entry: accession, taxid, common name, download method, analysis group

genomes:

  # ── GALLUS GALLUS (two separate runs) ──────────────────────────────────
  gallus_standard:
    accession: "GCF_016700215.2"          # PRJNA660757 representative assembly
    taxid: 9031
    label: "Gallus gallus standard ref"
    method: datasets                       # use NCBI datasets CLI
    db_group: "run_gallus_standard"        # build separate DB for this

  gallus_complete:
    accession: "GCF_016700215.2"          # swap with PRJNA693184 assembly when available
    taxid: 9031
    label: "Gallus gallus complete genome"
    method: datasets
    db_group: "run_gallus_complete"

  # ── GALLIFORMES PANEL ──────────────────────────────────────────────────
  coturnix:
    accession: "GCF_001577835.1"          # Coturnix japonica
    taxid: 93934
    label: "Japanese quail"
    method: datasets
    db_group: "shared"

  turkey:
    accession: "GCF_000146605.3"          # Meleagris gallopavo
    taxid: 9103
    label: "Turkey"
    method: datasets
    db_group: "shared"

  phasianus:
    accession: "1567712450"               # single chromosome, Nuccore
    taxid: 9054
    label: "Common pheasant"
    method: efetch                         # different download method
    db_group: "shared"

  peafowl:
    accession: "PRJNA891214"              # BioProject - download via SRA
    taxid: 9000
    label: "Peafowl"
    method: bioproject
    db_group: "shared"

  # ── BACTERIA ──────────────────────────────────────────────────────────
  b_hinzii_1:
    accession: "GCA_006770425.1"
    taxid: 103843
    label: "Bordetella hinzii strain 1"
    method: datasets
    db_group: "run_b_hinzii_1"            # separate DB run

  b_hinzii_2:
    accession: "GCF_900637615.1"
    taxid: 103843
    label: "Bordetella hinzii strain 2"
    method: datasets
    db_group: "run_b_hinzii_2"            # separate DB run

  b_avium:
    accession: "GCF_047783805.1"
    taxid: 521
    label: "Bordetella avium"
    method: datasets
    db_group: "shared"

  # ── FISH ──────────────────────────────────────────────────────────────
  trout:
    accession: "GCF_013265735.2"          # Oncorhynchus mykiss
    taxid: 8022
    label: "Rainbow trout"
    method: datasets
    db_group: "shared"

  salmon:
    accession: "GCF_000233375.1"          # Salmo salar
    taxid: 8030
    label: "Atlantic salmon"
    method: datasets
    db_group: "shared"

# ── DATABASE BUILD GROUPS ──────────────────────────────────────────────
# Each db_group gets its own Kraken2 build (for independent comparisons)
db_builds:
  run_gallus_standard:
    includes: ["gallus_standard", "coturnix", "turkey", "phasianus",
               "peafowl", "b_hinzii_1", "b_avium", "trout", "salmon"]
  run_gallus_complete:
    includes: ["gallus_complete", "coturnix", "turkey", "phasianus",
               "peafowl", "b_hinzii_1", "b_avium", "trout", "salmon"]
  run_b_hinzii_1:
    includes: ["gallus_standard", "coturnix", "b_hinzii_1", "b_avium",
               "trout", "salmon"]
  run_b_hinzii_2:
    includes: ["gallus_standard", "coturnix", "b_hinzii_2", "b_avium",
               "trout", "salmon"]